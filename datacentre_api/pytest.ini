[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add the repo root to sys.path so test files can `import modules.*`.
# Without this, running plain `pytest` (as CI does) fails with
# ModuleNotFoundError because pytest doesn't auto-add cwd the way
# `python -m pytest` does.
pythonpath = .

# Set asyncio mode to auto
asyncio_mode = auto

# Set the fixture loop scope to function (per the warning message)
asyncio_default_fixture_loop_scope = function

# More verbose output
log_cli = true
log_cli_level = INFO

# Filter out warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning