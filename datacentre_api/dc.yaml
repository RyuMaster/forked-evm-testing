  /users:
    get:
      summary: Get data for users
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number, starting from 1"
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: "Number of records per page (options: 5, 20, 50)"
          schema:
            type: integer
            format: int32
            enum: [5, 20, 50]
            example: 20
        - name: sort_by
          in: query
          required: false
          description: "Field to sort by"
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: "Sort order: 'asc' or 'desc'"
          schema:
            type: string
            enum: [asc, desc]
            example: asc
        - name: name_prefix
          in: query
          required: false
          description: "Name prefix to search"
          schema:
            type: string
            minLength: 2
        - name: names
          in: query
          required: false
          description: "List of names to include"
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: "Successful response"
  /users/detailed:
    get:
      summary: Get detailed data for users including trading data
      parameters:
        - name: page
          in: query
          required: false
