openapi: 3.0.0
info:
  title: SoccerVerse API
  version: 1.0.0
servers:
  - url: https://api-beta.soccerverse.com
paths:
  /clubs:
    get:
      summary: Get influence market data for clubs
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number, starting from 1"
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: "Number of records per page (options: 5, 20, 50)"
          schema:
            type: integer
            format: int32
            enum: [5, 20, 50]
            example: 20
        - name: sort_by
          in: query
          required: false
          description: "Field to sort by"
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: "Sort order: 'asc' or 'desc'"
          schema:
            type: string
            enum: [asc, desc]
            example: asc
        - name: club_id
          in: query
          required: false
          description: "Filter by specific club ID"
          schema:
            type: integer
        - name: country_id
          in: query
          required: false
          description: "Country ID to filter clubs"
          schema:
            type: string
        - name: owned
          in: query
          required: false
          description: "Filter clubs owned by the given name"
          schema:
            type: string
      responses:
        '200':
          description: "Successful response"
  /clubs/detailed:
    get:
      summary: Get detailed data for clubs
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number, starting from 1"
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: "Number of records per page (options: 5, 20, 50)"
          schema:
            type: integer
            format: int32
            enum: [5, 20, 50]
            example: 20
        - name: sort_by
          in: query
          required: false
          description: "Field to sort by"
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: "Sort order: 'asc' or 'desc'"
          schema:
            type: string
            enum: [asc, desc]
            example: asc
        - name: club_id
          in: query
          required: false
          description: "Filter by specific club ID"
          schema:
            type: integer
        - name: country_id
          in: query
          required: false
          description: "Country ID to filter clubs"
          schema:
            type: string
        - name: owned
          in: query
          required: false
          description: "Filter clubs owned by the given name"
          schema:
            type: string
      responses:
        '200':
          description: "Successful response"
  /players:
    get:
      summary: Get influence market data for players
      parameters:
        - name: page
          in: query
          required: false
          description: "Page number, starting from 1"
          schema:
            type: integer
            format: int32
            minimum: 1
            example: 1
        - name: per_page
          in: query
          required: false
          description: "Number of records per page (options: 5, 20, 50)"
          schema:
            type: integer
            format: int32
            enum: [5, 20, 50]
            example: 20
        - name: sort_by
          in: query
          required: false
          description: "Field to sort by"
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: "Sort order: 'asc' or 'desc'"
          schema:
            type: string
            enum: [asc, desc]
            example: asc
        - name: age_min
          in: query
          required: false
          description: "Minimum age for players"
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: age_max
          in: query
          required: false
          description: "Maximum age for players"
          schema:
            type: integer
            format: int32
            minimum: 0
        - name: player_id
          in: query
          required: false
          description: "Filter by specific player ID"
          schema:
            type: integer
        - name: country_id
          in: query
          required: false
          description: "Country ID to filter players"
          schema:
            type: string
        - name: owned
          in: query
          required: false
          description: "Filter players owned by the given name"
          schema:
            type: string
      responses:
        '200':
          description: "Successful response"
  /players/detailed:
