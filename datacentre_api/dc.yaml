            enum: [5, 20, 50]
            example: 20
        - name: sort_by
          in: query
          required: false
          description: "Field to sort by"
          schema:
            type: string
        - name: sort_order
          in: query
          required: false
          description: "Sort order: 'asc' or 'desc'"
          schema:
