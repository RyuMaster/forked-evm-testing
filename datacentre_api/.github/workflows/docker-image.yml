name: Docker Build and Push CI

on:
  push:
    branches:
      - "**"

permissions:
  id-token: write  # This is required for requesting the JWT
  contents: read   # This is required for actions/checkout

env:
  AWS_REGION: 'eu-west-1'
  ECR_REPOSITORY: 'datacentre_api'
  AWS_ROLE: 'github-eu-west-1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Pinned to match docker/Dockerfile FROM python:3.13-slim-bookworm.
          # Keep these two in sync — bumping the minor in one place
          # without the other risks shipping a build that ran tests on a
          # different Python than prod uses.
          python-version: '3.13'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        run: pytest -v

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Image Tag
        id: tag
        run: echo "TAG_NAME=$(git rev-parse --short=7 HEAD)" >> $GITHUB_ENV
      - name: Print Image Tag
        run: echo "Tag Name for the Image ${{ env.TAG_NAME }}"
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::875187034214:role/${{ env.AWS_ROLE }}
          role-session-name: AWSSession
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'
      - name: Build the Docker image
        run: docker build -f docker/Dockerfile --tag 875187034214.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:$TAG_NAME .
      - name: Push the Docker image
        run: docker push 875187034214.dkr.ecr.eu-west-1.amazonaws.com/$ECR_REPOSITORY:$TAG_NAME
