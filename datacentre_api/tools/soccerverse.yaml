  /users/detailed:
    get:
      tags:
      - Users
      summary: Get detailed user and trading data
      description: "Fetches a paginated list of users with detailed trading volume\
        \ statistics \n    (daily, weekly, total), last activity, club information\
        \ (manager voted), and profile picture. \n    Supports sorting and filtering\
        \ by name prefix or a list of names."
      operationId: get_users_detailed_users_detailed_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number, starting from 1
          default: 1
          title: Page
        description: Page number, starting from 1
      - name: per_page
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PerPageOptions'
          description: 'Number of records per page (options: 5, 20, 50)'
          default: 20
        description: 'Number of records per page (options: 5, 20, 50)'
      - name: sort_by
        in: query
        required: false
        schema:
          description: Field to sort by
          title: Sort By
          nullable: true
          $ref: '#/components/schemas/UsersDetailedSortBy'
        description: Field to sort by
      - name: sort_order
        in: query
        required: false
        schema:
          description: 'Sort order: ''asc'' or ''desc'''
          default: asc
          title: Sort Order
          nullable: true
          type: string
          pattern: ^(asc|desc)$
        description: 'Sort order: ''asc'' or ''desc'''
      - name: name_prefix
        in: query
        required: false
        schema:
          description: Name prefix to search
          title: Name Prefix
          nullable: true
          type: string
          minLength: 2
        description: Name prefix to search
      - name: names
        in: query
        required: false
        schema:
          description: List of names to include
          title: Names
          nullable: true
          type: array
          items:
            type: string
        description: List of names to include
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_UserDetailedResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /share_trade_history:
    get:
      tags:
      - Share Trade History
      summary: Retrieve share trade history
      description: Provides a paginated record of trades (buy/sell transactions) for
        specific clubs or players, optionally filtered by buyer/seller name.
      operationId: get_share_trade_history_share_trade_history_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number, starting from 1
          default: 1
          title: Page
        description: Page number, starting from 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Number of records per page
          default: 50
          title: Per Page
        description: Number of records per page
      - name: name
        in: query
        required: false
        schema:
          description: Name of the buyer or seller
          title: Name
          nullable: true
          type: string
        description: Name of the buyer or seller
      - name: club_id
        in: query
        required: false
        schema:
          description: Club ID to filter trades
          title: Club Id
          nullable: true
          type: integer
        description: Club ID to filter trades
      - name: player_id
        in: query
        required: false
        schema:
          description: Player ID to filter trades
          title: Player Id
          nullable: true
          type: integer
        description: Player ID to filter trades
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_ShareTradeResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /trading_graph:
    get:
      tags:
      - Trading Graph
      summary: Retrieve aggregated trading data
      description: Generates time-series data (volume and weighted average price)
        for a club or player's trading activity, grouped by specified time intervals
        (e.g., 1d, 7d, 30d, 90d, 6m, 1y).
      operationId: get_trading_graph_trading_graph_get
      parameters:
      - name: club_id
        in: query
        required: false
        schema:
          description: Club ID
          title: Club Id
          nullable: true
          type: integer
        description: Club ID
      - name: player_id
        in: query
        required: false
        schema:
          description: Player ID
          title: Player Id
          nullable: true
          type: integer
        description: Player ID
      - name: time_range
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/TimeRangeEnum'
          description: 'Time range: ''1d'', ''7d'', ''30d'', ''90d'', ''6m'', ''1y'''
        description: 'Time range: ''1d'', ''7d'', ''30d'', ''90d'', ''6m'', ''1y'''
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradingGraphDataPoint'
                title: Response Get Trading Graph Trading Graph Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /share_balances:
    get:
      tags:
      - Share Balances
      summary: Retrieve influence balances
      description: Returns influence ownership data for clubs or players, filtered
        by various parameters (e.g., name, club_id, player_id). Can also aggregate
        data by country or league.
      operationId: get_share_balances_share_balances_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number, starting from 1
          default: 1
          title: Page
        description: Page number, starting from 1
      - name: per_page
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PerPageOptions'
          description: 'Number of records per page (options: 5, 10, 20, 50)'
          default: 20
        description: 'Number of records per page (options: 5, 10, 20, 50)'
      - name: sort_by
        in: query
        required: false
        schema:
          description: 'Field to sort by (options: ''name'', ''share_type'', ''share_id'',
            ''num'')'
          title: Sort By
          nullable: true
          $ref: '#/components/schemas/ShareBalancesSortBy'
        description: 'Field to sort by (options: ''name'', ''share_type'', ''share_id'',
          ''num'')'
      - name: sort_order
        in: query
        required: false
        schema:
          description: 'Sort order: ''asc'' or ''desc'''
          default: asc
          title: Sort Order
          nullable: true
          type: string
          pattern: ^(asc|desc)$
        description: 'Sort order: ''asc'' or ''desc'''
      - name: club_id
        in: query
        required: false
        schema:
          description: Filter by club ID
          title: Club Id
          nullable: true
          type: integer
        description: Filter by club ID
      - name: player_id
        in: query
        required: false
        schema:
          description: Filter by player ID
          title: Player Id
          nullable: true
          type: integer
        description: Filter by player ID
      - name: name
        in: query
        required: false
        schema:
          description: Filter by name
          title: Name
          nullable: true
          type: string
        description: Filter by name
      - name: countries
        in: query
        required: false
        schema:
          description: Set to True to get data aggregated per country
          default: false
          title: Countries
          nullable: true
          type: boolean
        description: Set to True to get data aggregated per country
      - name: leagues
        in: query
        required: false
        schema:
          description: Set to True to get data aggregated per league
          default: false
          title: Leagues
          nullable: true
