          description: Maximum desired_contract
          title: Desired Contract Max
          nullable: true
          type: integer
        description: Maximum desired_contract
      - name: country_id
        in: query
        required: false
        schema:
          description: Country ID to filter players
          title: Country Id
          nullable: true
          type: string
        description: 'Country ID to filter players (Examples: ENG, ESP, ITA)'
        example: ENG
      - name: owned
        in: query
        required: false
        schema:
          description: Filter players owned by the given name
          title: Owned
          nullable: true
          type: string
        description: Filter players owned by the given name
      - name: positions
        in: query
        required: false
        schema:
          description: Comma-separated list of positions to filter players
          title: Positions
          nullable: true
          type: string
        description: Comma-separated list of positions to filter players
      - name: club_id
        in: query
        required: false
        schema:
          description: Filter by specific club ID
          title: Club Id
          nullable: true
          type: integer
        description: Filter by specific club ID
      - name: allow_transfer
        in: query
        required: false
        schema:
          description: Filter by allow_transfer value
          title: Allow Transfer
          nullable: true
          type: integer
        description: Filter by allow_transfer value
      - name: allow_renew
        in: query
        required: false
        schema:
          description: Filter by allow_renew value
          title: Allow Renew
          nullable: true
          type: integer
        description: Filter by allow_renew value
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse_PlayerDetailedResponse_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /clubs/detailed:
