openapi: 3.0.0
info:
  title: FastAPI
  version: 0.1.0
paths:
  /players/detailed:
    get:
      tags:
      - Players
      summary: Retrieve detailed soccer player data
      description: Provides a paginated list of players with additional fields such
        as fitness, injuries, contract details, rating breakdowns, and more comprehensive
        stats.
      operationId: get_players_detailed_players_detailed_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number, starting from 1
          default: 1
          title: Page
        description: Page number, starting from 1
      - name: per_page
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/PerPageOptions'
          description: 'Number of records per page (options: 5, 10, 20, 50)'
          default: 20
        description: 'Number of records per page (options: 5, 10, 20, 50)'
      - name: sort_by
        in: query
        required: false
        schema:
          description: Field to sort by
          title: Sort By
          nullable: true
          $ref: '#/components/schemas/PlayersSortBy'
        description: Field to sort by
      - name: sort_order
        in: query
        required: false
        schema:
          description: 'Sort order: ''asc'' or ''desc'''
          default: asc
          title: Sort Order
          nullable: true
          type: string
          pattern: ^(asc|desc)$
        description: 'Sort order: ''asc'' or ''desc'''
      - name: age_min
        in: query
        required: false
        schema:
          description: Minimum age for players
          title: Age Min
          nullable: true
          type: integer
          minimum: 0
        description: Minimum age for players
      - name: age_max
        in: query
        required: false
        schema:
          description: Maximum age for players
          title: Age Max
          nullable: true
          type: integer
          minimum: 0
        description: Maximum age for players
      - name: age
        in: query
        required: false
        schema:
          description: Exact age for players
          title: Age
          nullable: true
          type: integer
          minimum: 0
        description: Exact age for players
      - name: player_id
        in: query
        required: false
        schema:
          description: Filter by specific player ID(s)
          title: Player Id
          nullable: true
          type: array
          items:
            type: integer
        description: Filter by specific player ID(s)
        example: 1100
      - name: wages_min
        in: query
        required: false
        schema:
          description: Minimum wages
          title: Wages Min
          nullable: true
          type: integer
        description: Minimum wages
      - name: wages_max
        in: query
        required: false
        schema:
          description: Maximum wages
          title: Wages Max
          nullable: true
          type: integer
        description: Maximum wages
      - name: contract_min
        in: query
        required: false
        schema:
          description: Minimum contract
          title: Contract Min
          nullable: true
          type: integer
        description: Minimum contract
      - name: contract_max
        in: query
        required: false
        schema:
          description: Maximum contract
          title: Contract Max
          nullable: true
          type: integer
        description: Maximum contract
      - name: rating_min
        in: query
        required: false
        schema:
          description: Minimum rating
          title: Rating Min
          nullable: true
          type: integer
        description: Minimum rating
      - name: rating_max
        in: query
        required: false
        schema:
          description: Maximum rating
          title: Rating Max
          nullable: true
          type: integer
        description: Maximum rating
      - name: rating_gk_min
        in: query
        required: false
        schema:
