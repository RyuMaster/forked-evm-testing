# Runs Xaya X connected to a real Polygon (or other EVM) network,
# along with a GSP and archival MySQL database, exposed via reverse proxy.

services:

  xayax:
    image: xaya/xayax
    command: [
      "eth",
      "--eth_rpc_url=http://nginx/chain",
      "--eth_ws_url=http://nginx/chain",
      "--accounts_contract=${ACCOUNTS_CONTRACT}",
      "--xayax_block_range=90",
      "--nolisten_locally",
      "--alsologtostderr",
      "--max_reorg_depth=1000"
    ]
    stop_grace_period: 1s
    restart: on-failure

  gsp-init:
    image: alpine
    environment:
      FORCE_RESEED: ${FORCE_RESEED:-0}
    volumes:
      - gspdata:/xayagame
      - ${STORAGE_SQLITE_PATH:-./storage.sqlite}:/seed/storage.sqlite:ro
    command:
      - sh
      - -c
      - |
        if [ "$$FORCE_RESEED" = "1" ] || [ ! -f /xayagame/sv/polygon/storage.sqlite ]; then
          mkdir -p /xayagame/sv/polygon
          cp /seed/storage.sqlite /xayagame/sv/polygon/storage.sqlite
          echo "Seeded storage.sqlite (FORCE_RESEED=$$FORCE_RESEED)"
        else
          echo 'storage.sqlite already exists, skipping seed (set FORCE_RESEED=1 to overwrite)'
        fi

        echo 'Running schema migrations...'
        apk add --no-cache sqlite > /dev/null 2>&1
        DB=/xayagame/sv/polygon/storage.sqlite

        sqlite3 "$$DB" "ALTER TABLE league_player ADD COLUMN clean_sheets INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE cup_player ADD COLUMN clean_sheets INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE league_player ADD COLUMN minutes_played INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE cup_player ADD COLUMN minutes_played INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE leagues ADD COLUMN prize_ratio INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE players ADD COLUMN last_transfer INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "CREATE TABLE IF NOT EXISTS transfer_counts (from_club INTEGER NOT NULL, to_club INTEGER NOT NULL, transfers INTEGER NOT NULL, PRIMARY KEY (from_club, to_club));" 2>/dev/null || true
        sqlite3 "$$DB" "CREATE INDEX IF NOT EXISTS idx_transfer_counts_to ON transfer_counts (to_club, from_club);" 2>/dev/null || true

        echo 'Schema migrations complete'

  mariadb:
    build:
      context: ./db-init
    environment:
      MARIADB_ROOT_PASSWORD: gsparchival
      MARIADB_DATABASE: archival
    volumes:
      - ${ARCHIVAL_SQL_PATH:-./archival.sql}:/docker-entrypoint-initdb.d/archival.sql:ro
      - ${USERCONFIG_SQL_PATH:-./userconfig.sql}:/seed/userconfig.sql:ro
      - ./db-init/datacentre-overrides.cnf:/etc/mysql/conf.d/zz-extras.cnf:ro
      - mariadb_data:/var/lib/mysql
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-pgsparchival"]
      interval: 5s
      timeout: 5s
      start_period: 30m
      retries: 3

  gsp:
    image: ${GSP_IMAGE}
    command: [
      "--xaya_rpc_url=http://xayax:8000",
      "--xaya_rpc_protocol=2",
      "--nogame_rpc_listen_locally",
      "--xaya_connection_check_ms=10000",
      "--xaya_zmq_staleness_ms=10000",
      "--extfile_endpoint=http://soccerverse-download-site.s3-website.eu-west-2.amazonaws.com",
      "--archival_db=mysql://root:gsparchival@mariadb:3306/archival",
      "--alsologtostderr",
    ]
    volumes:
      - gspdata:/xayagame
    stop_grace_period: 1s
    depends_on:
      gsp-init:
        condition: service_completed_successfully
      healthcheck_xayax:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
    environment:
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_AUTH_HEADER: ${BLOCKCHAIN_AUTH_HEADER}
    ports:
      - "8100:80"
    stop_grace_period: 1s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  graph-postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: graph-node
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - graph_postgres_data:/var/lib/postgresql/data
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node -d graph-node"]
      interval: 5s
      timeout: 5s
      retries: 10

  ipfs:
    image: ipfs/kubo:latest
    volumes:
      - ipfs_data:/data/ipfs
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  graph-node:
    image: graphprotocol/graph-node:latest
    environment:
      postgres_host: graph-postgres
      postgres_user: graph-node
      postgres_pass: graph-node
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "matic:http://nginx/chain"
      GRAPH_LOG: info
      RUST_LOG: info
    stop_grace_period: 10s
    depends_on:
      graph-postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8020' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  subgraph-deploy:
    image: ${SUBGRAPH_DEPLOY_IMAGE}
    environment:
      # democrit subgraph.yaml is templated with these — deploy.sh runs
      # envsubst before graph build. When the address vars are empty,
      # deploy.sh skips democrit (the placeholders would not be valid).
      DEMOCRIT_NETWORK: ${DEMOCRIT_NETWORK:-matic}
      DEMOCRIT_CONTRACT_ADDRESS: ${DEMOCRIT_CONTRACT_ADDRESS:-}
      VAULTMANAGER_CONTRACT_ADDRESS: ${VAULTMANAGER_CONTRACT_ADDRESS:-}
      DEMOCRIT_START_BLOCK: ${DEMOCRIT_START_BLOCK:-0}
    volumes:
      # Subgraph sources are baked into ${SUBGRAPH_DEPLOY_IMAGE} (no bind
      # mount needed). Operator-supplied real democrit ABIs are layered in
      # at /abis-override/ and copied over the baked-in placeholders by
      # deploy.sh. When DEMOCRIT_ABI_PATH / VAULTMANAGER_ABI_PATH are unset,
      # /dev/null binds in (appears as a char device, filtered out by
      # deploy.sh) and democrit is skipped via its placeholder marker.
      - ${DEMOCRIT_ABI_PATH:-/dev/null}:/abis-override/Democrit.json:ro
      - ${VAULTMANAGER_ABI_PATH:-/dev/null}:/abis-override/VaultManager.json:ro
      - graph_hashes_shared:/shared
    depends_on:
      graph-node:
        condition: service_healthy
    restart: "no"

  healthcheck_xayax:
    build:
      context: ./healthcheck
    stop_grace_period: 1s
    healthcheck:
      test: ["CMD", "/usr/local/bin/xayax.py"]
      interval: 1s
      timeout: 5s
      retries: 10

  datacentre-updater:
    image: ${DATACENTRE_UPDATER_IMAGE}
    entrypoint: ["/bin/bash", "-c", "sed -i \"s/utf8mb4_0900_bin/utf8mb4_bin/g\" db_manager.py && python main.py"]
    environment:
      SOURCE_DB_HOST: mariadb
      SOURCE_DB_USER: root
      SOURCE_DB_PASSWORD: gsparchival
      SOURCE_DB_NAME: archival
      DEST_DB_HOST: mariadb
      DEST_DB_USER: root
      DEST_DB_PASSWORD: gsparchival
      DEST_DB_NAME: datacentre
      BIGQUERY_DB_HOST: mariadb
      BIGQUERY_DB_USER: root
      BIGQUERY_DB_PASSWORD: gsparchival
      BIGQUERY_DB_NAME: bigquery_local
      SQLITE_PATH: /xayagame/sv/polygon/storage.sqlite
      DATAPACK_URL: https://downloads.soccerverse.com/svpack/default.json
      DUMP_OUTPUT_FOLDER: /dumps
      GAME_ID: ${GAME_ID:-sv}
      SVC_POLYGON_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/democrit
      POLYGON_STATS_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/stats
      SV_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/sv
    volumes:
      - gspdata:/xayagame:ro
      - datadumps:/dumps
    depends_on:
      mariadb:
        condition: service_healthy
      gsp-init:
        condition: service_completed_successfully
      subgraph-deploy:
        condition: service_completed_successfully
    restart: on-failure

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_yml
        target: /etc/prometheus/prometheus.yml
        mode: 0444
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=270d
      - --storage.tsdb.path=/prometheus
    # Internal-only: no host port. Grafana reaches this via the docker network.

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    configs:
      - source: grafana_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
        mode: 0444
      - source: grafana_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
        mode: 0444
      - source: grafana_api_perf_dashboard
        target: /var/lib/grafana/dashboards/api-perf.json
        mode: 0444
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      DC_MARIADB_USER: ${MARIADB_USER}
      DC_MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    depends_on:
      prometheus:
        condition: service_started
      mariadb:
        condition: service_healthy

  datacentre-api:
    image: ${DATACENTRE_API_IMAGE}
    # Gunicorn (1 worker) instead of `python3 main.py` so the master
    # process serves /metrics on port 9100 (see gunicorn.conf.py),
    # which Prometheus scrapes for the API Performance dashboard's
    # Row 1 panels. Uvicorn alone leaves :9100 unbound. -w 1 keeps
    # behavior identical to the previous uvicorn.run(workers=1).
    entrypoint: ["sh", "-c", "set -a; . /shared/graph_hashes.env; set +a; exec gunicorn -c gunicorn.conf.py -w 1 -k uvicorn.workers.UvicornWorker main:app -b 0.0.0.0:8000"]
    environment:
      MYSQL_HOST: mariadb
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: gsparchival
      MYSQL_DB: datacentre
      MYSQL_ARCHIVAL_HOST: mariadb
      MYSQL_ARCHIVAL_PORT: "3306"
      MYSQL_ARCHIVAL_USER: root
      MYSQL_ARCHIVAL_PASSWORD: gsparchival
      MYSQL_ARCHIVAL_DB: archival
      USERCONFIG_HOST: mariadb
      USERCONFIG_PORT: "3306"
      USERCONFIG_USER: root
      USERCONFIG_PASS: gsparchival
      USERCONFIG_DB: userconfig
      SQLITE_DB_PATH: /xayagame/sv/polygon/storage.sqlite
      ROOT_PATH: /api
      PERF_BEACON_ALLOWED_ORIGINS: ${PERF_BEACON_ALLOWED_ORIGINS:-http://localhost:3000}
      PERF_BEACON_RATE: ${PERF_BEACON_RATE:-20000/minute}
      GAME_ID: ${GAME_ID:-sv}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ""
      GRAPH_POSTGRES_HOST: graph-postgres
      GRAPH_POSTGRES_PORT: "5432"
      GRAPH_POSTGRES_USER: graph-node
      GRAPH_POSTGRES_PASSWORD: graph-node
      GRAPH_POSTGRES_DB: graph-node
      GRAPH_SUBGRAPH_SV_URL: http://graph-node:8000/subgraphs/name/sv
      DEFAULT_PROFILE_PIC_URL: https://downloads.soccerverse.com/default_profile.jpg
      DUMP_OUTPUT_FOLDER: /dumps
    volumes:
      - gspdata:/xayagame:ro
      - datadumps:/dumps:ro
      - graph_hashes_shared:/shared:ro
    depends_on:
      mariadb:
        condition: service_healthy
      gsp-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      graph-postgres:
        condition: service_healthy
      subgraph-deploy:
        condition: service_completed_successfully
    restart: on-failure

# Configs inlined here (instead of bind-mounted from monitoring/) because
# Portainer's "Repository" deployment mode does NOT fetch repo subdirectories
# to /data/compose/N/ — only the docker-compose.yml itself. Bind mounts at
# ./monitoring/... resolve to empty Docker-auto-created paths and fail at
# container start. The standalone files in monitoring/ remain as
# human-readable references; edit BOTH places when changing them, or delete
# the standalone files if you prefer a single source of truth.
configs:
  prometheus_yml:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: datacentre-api
          static_configs:
            - targets: ['datacentre-api:9100']
          metrics_path: /metrics
          scrape_interval: 15s

  grafana_datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false

        - name: MariaDB-datacentre
          type: mysql
          uid: mariadb-datacentre
          url: mariadb:3306
          database: datacentre
          user: ${DC_MARIADB_USER:-root}
          jsonData:
            maxOpenConns: 10
            maxIdleConns: 2
          secureJsonData:
            password: ${DC_MARIADB_PASSWORD:-gsparchival}
          editable: false

  grafana_dashboards_provider:
    content: |
      apiVersion: 1
      providers:
        - name: 'API Perf'
          orgId: 1
          folder: 'API Performance'
          type: file
          disableDeletion: false
          updateIntervalSeconds: 30
          allowUiUpdates: true
          options:
            path: /var/lib/grafana/dashboards

  grafana_api_perf_dashboard:
    content: |
      {
        "annotations": { "list": [] },
        "editable": true,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 0,
        "id": null,
        "links": [],
        "liveNow": false,
        "panels": [
          {
            "type": "row",
            "title": "Overview (Prometheus)",
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
            "id": 100,
            "collapsed": false
          },
          {
            "type": "stat",
            "title": "Calls / minute by target (last 5m)",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
            "id": 1,
            "targets": [
              {
                "expr": "sum by (target) (rate(frontend_api_calls_total[5m])) * 60",
                "legendFormat": "{{target}}",
                "refId": "A"
              }
            ],
            "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
          },
          {
            "type": "stat",
            "title": "Error rate (4xx + 5xx + network) / total",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
            "id": 2,
            "targets": [
              {
                "expr": "sum(rate(frontend_api_calls_total{status_class=~\"4xx|5xx|network_error\"}[5m])) / sum(rate(frontend_api_calls_total[5m]))",
                "refId": "A"
              }
            ],
            "fieldConfig": { "defaults": { "unit": "percentunit", "decimals": 2 } }
          },
          {
            "type": "timeseries",
            "title": "Duration p95 by target",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 7 },
            "id": 3,
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum by (target, le) (rate(frontend_api_call_duration_seconds_bucket[5m])))",
                "legendFormat": "p95 {{target}}",
                "refId": "A"
              },
              {
                "expr": "histogram_quantile(0.50, sum by (target, le) (rate(frontend_api_call_duration_seconds_bucket[5m])))",
                "legendFormat": "p50 {{target}}",
                "refId": "B"
              }
            ],
            "fieldConfig": { "defaults": { "unit": "s" } }
          },
          {
            "type": "timeseries",
            "title": "Network overhead p95 (datacentre-api only)",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 7 },
            "id": 4,
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum by (le) (rate(frontend_api_network_overhead_seconds_bucket{target=\"datacentre-api\"}[5m])))",
                "legendFormat": "network p95",
                "refId": "A"
              }
            ],
            "fieldConfig": { "defaults": { "unit": "s" } }
          },
          {
            "type": "row",
            "title": "Per-page drill-down (MariaDB)",
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 },
            "id": 200,
            "collapsed": false
          },
          {
            "type": "table",
            "title": "Slowest pages (last 24h, p95)",
            "datasource": { "type": "mysql", "uid": "mariadb-datacentre" },
            "gridPos": { "h": 10, "w": 12, "x": 0, "y": 16 },
            "id": 5,
            "targets": [
              {
                "rawSql": "SET SESSION group_concat_max_len = 4194304;\nSELECT page_route,\n       COUNT(*) AS calls,\n       ROUND(AVG(duration_ms)) AS avg_ms,\n       ROUND(SUBSTRING_INDEX(SUBSTRING_INDEX(\n         GROUP_CONCAT(duration_ms ORDER BY duration_ms),\n         ',', CEIL(0.95 * COUNT(*))), ',', -1)) AS p95_ms\nFROM api_request_log\nWHERE ts >= NOW() - INTERVAL 24 HOUR\nGROUP BY page_route\nORDER BY p95_ms DESC\nLIMIT 20;",
                "format": "table",
                "refId": "A"
              }
            ]
          },
          {
            "type": "barchart",
            "title": "Top pages by call volume (last 24h)",
            "datasource": { "type": "mysql", "uid": "mariadb-datacentre" },
            "gridPos": { "h": 10, "w": 12, "x": 12, "y": 16 },
            "id": 6,
            "targets": [
              {
                "rawSql": "SELECT page_route, COUNT(*) AS calls\nFROM api_request_log\nWHERE ts >= NOW() - INTERVAL 24 HOUR\nGROUP BY page_route\nORDER BY calls DESC\nLIMIT 20;",
                "format": "table",
                "refId": "A"
              }
            ]
          },
          {
            "type": "row",
            "title": "Per-endpoint drill-down (MariaDB)",
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 26 },
            "id": 300,
            "collapsed": false
          },
          {
            "type": "table",
            "title": "Slowest endpoints (target × endpoint, last 24h, p95)",
            "datasource": { "type": "mysql", "uid": "mariadb-datacentre" },
            "gridPos": { "h": 12, "w": 24, "x": 0, "y": 27 },
            "id": 7,
            "targets": [
              {
                "rawSql": "SET SESSION group_concat_max_len = 4194304;\nSELECT target, endpoint,\n       COUNT(*) AS calls,\n       ROUND(AVG(duration_ms)) AS avg_ms,\n       ROUND(SUBSTRING_INDEX(SUBSTRING_INDEX(\n         GROUP_CONCAT(duration_ms ORDER BY duration_ms),\n         ',', CEIL(0.95 * COUNT(*))), ',', -1)) AS p95_ms\nFROM api_request_log\nWHERE ts >= NOW() - INTERVAL 24 HOUR\nGROUP BY target, endpoint\nORDER BY p95_ms DESC\nLIMIT 30;",
                "format": "table",
                "refId": "A"
              }
            ]
          },
          {
            "type": "row",
            "title": "Single session view",
            "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
            "id": 400,
            "collapsed": false
          },
          {
            "type": "table",
            "title": "Session timeline (filter via $session_id)",
            "datasource": { "type": "mysql", "uid": "mariadb-datacentre" },
            "gridPos": { "h": 14, "w": 24, "x": 0, "y": 40 },
            "id": 8,
            "targets": [
              {
                "rawSql": "SELECT ts, page_route, target, endpoint, method, status, duration_ms, server_ms\nFROM api_request_log\nWHERE session_id = '$session_id'\n  AND ts >= NOW() - INTERVAL 7 DAY\nORDER BY ts;",
                "format": "table",
                "refId": "A"
              }
            ]
          }
        ],
        "refresh": "30s",
        "schemaVersion": 39,
        "tags": ["api", "perf"],
        "templating": {
          "list": [
            {
              "name": "session_id",
              "type": "query",
              "datasource": { "type": "mysql", "uid": "mariadb-datacentre" },
              "query": "SELECT DISTINCT session_id FROM api_request_log WHERE ts >= NOW() - INTERVAL 24 HOUR ORDER BY ts DESC LIMIT 100;",
              "refresh": 2,
              "label": "Session"
            }
          ]
        },
        "time": { "from": "now-24h", "to": "now" },
        "timepicker": {},
        "timezone": "",
        "title": "API Performance",
        "uid": "api-perf",
        "version": 1,
        "weekStart": ""
      }

volumes:
  gspdata:
  mariadb_data:
  datadumps:
  redis_data:
  graph_postgres_data:
  ipfs_data:
  graph_hashes_shared:
  prometheus_data:
  grafana_data:
