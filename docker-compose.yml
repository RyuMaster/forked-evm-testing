# Runs Xaya X connected to a real Polygon (or other EVM) network,
# along with a GSP and archival MySQL database, exposed via reverse proxy.

services:

  xayax:
    image: xaya/xayax
    command: [
      "eth",
      "--eth_rpc_url=http://nginx/chain",
      "--eth_ws_url=http://nginx/chain",
      "--accounts_contract=${ACCOUNTS_CONTRACT}",
      "--xayax_block_range=90",
      "--nolisten_locally",
      "--alsologtostderr",
      "--max_reorg_depth=1000"
    ]
    stop_grace_period: 1s
    restart: on-failure

  gsp-init:
    image: alpine
    volumes:
      - gspdata:/xayagame
      - ${STORAGE_SQLITE_PATH:-./storage.sqlite}:/seed/storage.sqlite:ro
    command:
      - sh
      - -c
      - |
        if [ ! -f /xayagame/sv/polygon/storage.sqlite ]; then
          mkdir -p /xayagame/sv/polygon
          cp /seed/storage.sqlite /xayagame/sv/polygon/storage.sqlite
          echo 'Seeded storage.sqlite'
        else
          echo 'storage.sqlite already exists, skipping seed'
        fi

        echo 'Running schema migrations...'
        apk add --no-cache sqlite > /dev/null 2>&1
        DB=/xayagame/sv/polygon/storage.sqlite

        sqlite3 "$$DB" "ALTER TABLE league_player ADD COLUMN clean_sheets INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE cup_player ADD COLUMN clean_sheets INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE league_player ADD COLUMN minutes_played INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE cup_player ADD COLUMN minutes_played INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE leagues ADD COLUMN prize_ratio INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "ALTER TABLE players ADD COLUMN last_transfer INTEGER NOT NULL DEFAULT 0;" 2>/dev/null || true
        sqlite3 "$$DB" "CREATE TABLE IF NOT EXISTS transfer_counts (from_club INTEGER NOT NULL, to_club INTEGER NOT NULL, transfers INTEGER NOT NULL, PRIMARY KEY (from_club, to_club));" 2>/dev/null || true
        sqlite3 "$$DB" "CREATE INDEX IF NOT EXISTS idx_transfer_counts_to ON transfer_counts (to_club, from_club);" 2>/dev/null || true

        echo 'Schema migrations complete'

  mariadb:
    build:
      context: ./db-init
    environment:
      MARIADB_ROOT_PASSWORD: gsparchival
      MARIADB_DATABASE: archival
    volumes:
      - ${ARCHIVAL_SQL_PATH:-./archival.sql}:/docker-entrypoint-initdb.d/archival.sql:ro
      - ${USERCONFIG_SQL_PATH:-./userconfig.sql}:/seed/userconfig.sql:ro
      - mariadb_data:/var/lib/mysql
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "root", "-pgsparchival"]
      interval: 5s
      timeout: 5s
      start_period: 30m
      retries: 3

  gsp:
    image: ${GSP_IMAGE}
    command: [
      "--xaya_rpc_url=http://xayax:8000",
      "--xaya_rpc_protocol=2",
      "--nogame_rpc_listen_locally",
      "--xaya_connection_check_ms=10000",
      "--xaya_zmq_staleness_ms=10000",
      "--extfile_endpoint=http://soccerverse-download-site.s3-website.eu-west-2.amazonaws.com",
      "--archival_db=mysql://root:gsparchival@mariadb:3306/archival",
      "--alsologtostderr",
    ]
    volumes:
      - gspdata:/xayagame
    stop_grace_period: 1s
    depends_on:
      gsp-init:
        condition: service_completed_successfully
      healthcheck_xayax:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
    environment:
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      BLOCKCHAIN_AUTH_HEADER: ${BLOCKCHAIN_AUTH_HEADER}
    ports:
      - "8100:80"
    stop_grace_period: 1s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  graph-postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: graph-node
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - graph_postgres_data:/var/lib/postgresql/data
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph-node -d graph-node"]
      interval: 5s
      timeout: 5s
      retries: 10

  ipfs:
    image: ipfs/kubo:latest
    volumes:
      - ipfs_data:/data/ipfs
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  graph-node:
    image: graphprotocol/graph-node:latest
    environment:
      postgres_host: graph-postgres
      postgres_user: graph-node
      postgres_pass: graph-node
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "matic:http://nginx/chain"
      GRAPH_LOG: info
      RUST_LOG: info
    stop_grace_period: 10s
    depends_on:
      graph-postgres:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8030/graphql -H 'content-type: application/json' --post-data '{\"query\":\"{indexingStatuses{subgraph}}\"}' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  subgraph-deploy:
    image: ${SUBGRAPH_DEPLOY_IMAGE}
    volumes:
      - ./subgraphs/stats:/subgraphs/stats:ro
      - ./subgraphs/sv:/subgraphs/sv:ro
      - ./subgraphs/democrit:/subgraphs/democrit:ro
      # Operator-supplied real ABIs override the in-repo placeholders. When
      # both env vars point at real forge artefacts, the placeholder marker
      # is gone and democrit deploys; otherwise deploy.sh skips it.
      - ${DEMOCRIT_ABI_PATH:-./subgraphs/democrit/abis/Democrit.json}:/subgraphs/democrit/abis/Democrit.json:ro
      - ${VAULTMANAGER_ABI_PATH:-./subgraphs/democrit/abis/VaultManager.json}:/subgraphs/democrit/abis/VaultManager.json:ro
      - graph_hashes_shared:/shared
    depends_on:
      graph-node:
        condition: service_healthy
    restart: "no"

  healthcheck_xayax:
    build:
      context: ./healthcheck
    stop_grace_period: 1s
    healthcheck:
      test: ["CMD", "/usr/local/bin/xayax.py"]
      interval: 1s
      timeout: 5s
      retries: 10

  datacentre-updater:
    image: ${DATACENTRE_UPDATER_IMAGE}
    entrypoint: ["/bin/bash", "-c", "sed -i \"s/utf8mb4_0900_bin/utf8mb4_bin/g\" db_manager.py && python main.py"]
    environment:
      SOURCE_DB_HOST: mariadb
      SOURCE_DB_USER: root
      SOURCE_DB_PASSWORD: gsparchival
      SOURCE_DB_NAME: archival
      DEST_DB_HOST: mariadb
      DEST_DB_USER: root
      DEST_DB_PASSWORD: gsparchival
      DEST_DB_NAME: datacentre
      BIGQUERY_DB_HOST: mariadb
      BIGQUERY_DB_USER: root
      BIGQUERY_DB_PASSWORD: gsparchival
      BIGQUERY_DB_NAME: bigquery_local
      SQLITE_PATH: /xayagame/sv/polygon/storage.sqlite
      DATAPACK_URL: https://downloads.soccerverse.com/svpack/default.json
      DUMP_OUTPUT_FOLDER: /dumps
      GAME_ID: ${GAME_ID:-sv}
      SVC_POLYGON_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/democrit
      POLYGON_STATS_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/stats
      SV_SUBGRAPH_URL: http://graph-node:8000/subgraphs/name/sv
    volumes:
      - gspdata:/xayagame:ro
      - datadumps:/dumps
    depends_on:
      mariadb:
        condition: service_healthy
      gsp-init:
        condition: service_completed_successfully
      subgraph-deploy:
        condition: service_completed_successfully
    restart: on-failure

  datacentre-api:
    image: ${DATACENTRE_API_IMAGE}
    entrypoint: ["sh", "-c", "set -a; . /shared/graph_hashes.env; set +a; exec python3 main.py"]
    environment:
      MYSQL_HOST: mariadb
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: gsparchival
      MYSQL_DB: datacentre
      MYSQL_ARCHIVAL_HOST: mariadb
      MYSQL_ARCHIVAL_PORT: "3306"
      MYSQL_ARCHIVAL_USER: root
      MYSQL_ARCHIVAL_PASSWORD: gsparchival
      MYSQL_ARCHIVAL_DB: archival
      USERCONFIG_HOST: mariadb
      USERCONFIG_PORT: "3306"
      USERCONFIG_USER: root
      USERCONFIG_PASS: gsparchival
      USERCONFIG_DB: userconfig
      SQLITE_DB_PATH: /xayagame/sv/polygon/storage.sqlite
      ROOT_PATH: /api
      GAME_ID: ${GAME_ID:-sv}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_PASSWORD: ""
      GRAPH_POSTGRES_HOST: graph-postgres
      GRAPH_POSTGRES_PORT: "5432"
      GRAPH_POSTGRES_USER: graph-node
      GRAPH_POSTGRES_PASSWORD: graph-node
      GRAPH_POSTGRES_DB: graph-node
      GRAPH_SUBGRAPH_SV_URL: http://graph-node:8000/subgraphs/name/sv
      DEFAULT_PROFILE_PIC_URL: https://downloads.soccerverse.com/default_profile.jpg
      DUMP_OUTPUT_FOLDER: /dumps
    volumes:
      - gspdata:/xayagame:ro
      - datadumps:/dumps:ro
      - graph_hashes_shared:/shared:ro
    depends_on:
      mariadb:
        condition: service_healthy
      gsp-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      graph-postgres:
        condition: service_healthy
      subgraph-deploy:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  gspdata:
  mariadb_data:
  datadumps:
  redis_data:
  graph_postgres_data:
  ipfs_data:
  graph_hashes_shared:
